name: Build container

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      orbbec_ref:
        description: 'OrbbecSDK_ROS2 ref to build'
        required: false
        default: 'v2-main'
      orbbec_viewer_url:
        description: 'OrbbecViewer .zip URL (empty string to skip)'
        required: false
        default: 'https://github.com/orbbec/OrbbecSDK/releases/download/v1.10.27/OrbbecViewer_v1.10.27_202509260133_linux_x64_release.zip'
      orbbec_viewer_version:
        description: 'OrbbecViewer version (must match the URL)'
        required: false
        default: '1.10.27'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/orbbec-ros2-jazzy
  ROS_DISTRO: jazzy
  ORBBEC_REF: ${{ github.event.inputs.orbbec_ref || 'v2-main' }}
  ORBBEC_VIEWER_URL: ${{ github.event.inputs.orbbec_viewer_url || 'https://github.com/orbbec/OrbbecSDK/releases/download/v1.10.27/OrbbecViewer_v1.10.27_202509260133_linux_x64_release.zip' }}
  ORBBEC_VIEWER_VERSION: ${{ github.event.inputs.orbbec_viewer_version || '1.10.27' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            ROS_DISTRO=${{ env.ROS_DISTRO }}
            ORBBEC_REF=${{ env.ORBBEC_REF }}
            ORBBEC_VIEWER_URL=${{ env.ORBBEC_VIEWER_URL }}
            ORBBEC_VIEWER_VERSION=${{ env.ORBBEC_VIEWER_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test-compose:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config
