name: orbbec-ros2-jazzy

x-orbbec-common: &orbbec-common
  image: ${ORBBEC_IMAGE:-ghcr.io/bjoernellens1/orbbec-ros2-jazzy:latest}
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
    args:
      ROS_DISTRO: ${ROS_DISTRO:-jazzy}
      BASE_IMAGE: ${BASE_IMAGE:-ros:jazzy-ros-base}
      ORBBEC_REF: ${ORBBEC_REF:-v2-main}
  network_mode: host
  ipc: host
  privileged: true
  devices:
    - /dev/bus/usb:/dev/bus/usb
  # The whole-tree USB passthrough above covers all buses. ORBBEC_USB_DEVICE (see .env.example)
  # is exposed inside the container as a hint for `make doctor` and the OrbbecSDK so users
  # can document which physical port is in use; the bind-mount itself is intentionally global
  # for portability.
  volumes:
    - /dev:/dev
    - ./bags:/bags
    # Bind-mount the local scripts/ so changes (e.g. record-bag.sh, doctor.sh) take effect
    # without rebuilding the image. Scripts are also COPYed into /usr/local/bin at build time
    # for self-contained images, but the bind-mount takes precedence inside these services.
    - ./scripts:/opt/orbbec-scripts:ro
  environment:
    - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    - FASTDDS_BUILTIN_TRANSPORTS=${FASTDDS_BUILTIN_TRANSPORTS:-LARGE_DATA}
    - RCUTILS_COLORIZED_OUTPUT=1
    - ORBBEC_USB_DEVICE=${ORBBEC_USB_DEVICE:-}

services:
  femto-bolt:
    <<: *orbbec-common
    command: ["ros2", "launch", "orbbec_camera", "femto_bolt.launch.py"]

  femto-bolt-compressed:
    <<: *orbbec-common
    command:
      - ros2
      - launch
      - orbbec_camera
      - femto_bolt.launch.py
      - color_format:=MJPG
      - enable_color:=true
      - enable_depth:=true
      - enable_ir:=false
      - enable_point_cloud:=true

  femto-mega:
    <<: *orbbec-common
    command: ["ros2", "launch", "orbbec_camera", "femto_mega.launch.py", "enable_imu:=false", "enable_gyro:=false", "enable_accel:=false"]

  list-devices:
    <<: *orbbec-common
    profiles: ["tools"]
    command: ["ros2", "run", "orbbec_camera", "list_devices_node"]

  sdk-version:
    <<: *orbbec-common
    profiles: ["tools"]
    command:
      - bash
      - -lc
      - |
        ros2 launch orbbec_camera femto_bolt.launch.py &
        pid=$$!
        trap 'kill $$pid 2>/dev/null || true' EXIT
        sleep 5
        ros2 service call /camera/get_sdk_version orbbec_camera_msgs/srv/GetString '{}'

  topics:
    <<: *orbbec-common
    profiles: ["tools"]
    command: ["bash", "-lc", "ros2 topic list -t"]

  doctor:
    <<: *orbbec-common
    profiles: ["tools"]
    command: ["bash", "-lc", "/opt/orbbec-scripts/doctor.sh"]

  bag-record-rgbd:
    <<: *orbbec-common
    profiles: ["record"]
    command: ["bash", "-lc", "BAG_PREFIX=femto_bolt BAG_LAUNCH=femto_bolt.launch.py BAG_LAUNCH_ARGS='enable_imu:=true enable_gyro:=true enable_accel:=true enable_color:=true enable_depth:=true depth_registration:=true align_target_stream:=COLOR enable_frame_sync:=true publish_tf:=true enable_publish_extrinsic:=true enable_color_auto_exposure:=true enable_color_auto_white_balance:=true enable_noise_removal_filter:=true noise_removal_filter_min_diff:=256 noise_removal_filter_max_size:=80' BAG_IMU_TOPICS='/camera/gyro_accel/sample /camera/accel/imu_info /camera/gyro/imu_info' /opt/orbbec-scripts/record-bag.sh"]

  bag-record-rgbd-mega:
    <<: *orbbec-common
    profiles: ["record"]
    command: ["bash", "-lc", "BAG_PREFIX=femto_mega BAG_LAUNCH=femto_mega.launch.py BAG_LAUNCH_ARGS='enable_imu:=true enable_gyro:=true enable_accel:=true enable_color:=true enable_depth:=true depth_registration:=true align_target_stream:=COLOR enable_frame_sync:=true publish_tf:=true enable_publish_extrinsic:=true enable_color_auto_exposure:=true enable_color_auto_white_balance:=true enable_noise_removal_filter:=true noise_removal_filter_min_diff:=256 noise_removal_filter_max_size:=80' BAG_IMU_TOPICS='/camera/gyro_accel/sample /camera/accel/imu_info /camera/gyro/imu_info' /opt/orbbec-scripts/record-bag.sh"]

  shell:
    <<: *orbbec-common
    profiles: ["dev"]
    command: ["bash"]
    stdin_open: true
    tty: true

  rviz:
    <<: *orbbec-common
    profiles: ["gui"]
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      XAUTHORITY: /tmp/.docker.xauth
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri
      - ${XAUTHORITY:-/tmp/.docker.xauth}:/tmp/.docker.xauth:ro
    command: ["rviz2"]

  orbbecviewer:
    <<: *orbbec-common
    profiles: ["gui"]
    working_dir: /opt/OrbbecViewer/current
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      XAUTHORITY: /tmp/.docker.xauth
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri
      - ${XAUTHORITY:-/tmp/.docker.xauth}:/tmp/.docker.xauth:ro
    command: ["./OrbbecViewer"]
